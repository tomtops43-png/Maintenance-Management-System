<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>เข้าสู่ระบบ — Maintenance System ENC H9</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=11">
<link rel="apple-touch-icon" href="apple-touch-icon.png?v=11">
<link rel="icon" type="image/png" href="apple-touch-icon.png?v=11">
<link rel="manifest" href="site.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ENC H9">
<meta name="theme-color" content="#2563eb">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-brand">
      <span class="brand-mark">🛠️</span>
      <span class="at">ENC H9<small>Maintenance System</small></span>
    </div>
    <div class="field">
      <label>ชื่อผู้ใช้</label>
      <select id="userSelect"><option value="">— เลือกชื่อ —</option></select>
      <div class="hint">หากยังไม่มีรายชื่อ ให้เข้าสู่ระบบด้วยรหัสพนักงานด้านล่าง</div>
    </div>
    <div class="field">
      <label>หรือ รหัสพนักงาน (Emp ID)</label>
      <input id="empId" inputmode="numeric" placeholder="เช่น 0001">
    </div>
    <div class="field">
      <label>PIN (4 หลัก)</label>
      <input id="pin" type="password" inputmode="numeric" maxlength="4" placeholder="••••">
    </div>
    <button class="btn" id="loginBtn">เข้าสู่ระบบ</button>
    <div class="hint" style="margin-top:12px; text-align:center">ทดสอบ: 0001 / 1234</div>
  </div>
</div>
<div id="toast" class="toast"></div>
<div class="loading-overlay" id="overlay"><div class="load-card"><div class="spinner"></div><span>กำลังโหลด...</span></div></div>

<script src="js/config.js?v=11"></script>
<script src="js/utils.js?v=11"></script>
<script src="js/api.js?v=11"></script>
<script src="js/auth.js?v=11"></script>
<script>
function qp(k){ return new URLSearchParams(location.search).get(k); }
async function loadUsers(){
  try {
    var users = await API.call('getUserNames', {});
    var sel = document.getElementById('userSelect');
    // option value = Emp ID, label = name, so selecting a name fills Emp ID
    users.forEach(function(u){ sel.appendChild(new Option(u.name, u.empId)); });
  } catch(e){ /* backend not reachable yet; Emp ID login still works */ }
}
loadUsers();
// Auto-fill + lock the Emp ID box when a name is picked, then jump to PIN.
// Choosing the blank "— เลือกชื่อ —" option unlocks it for manual entry.
document.getElementById('userSelect').addEventListener('change', function(){
  var empEl = document.getElementById('empId');
  if(this.value){
    empEl.value = this.value;
    empEl.readOnly = true;
    empEl.style.background = 'var(--surface-2)';
    document.getElementById('pin').focus();
  } else {
    empEl.value = '';
    empEl.readOnly = false;
    empEl.style.background = '';
  }
});
document.getElementById('loginBtn').onclick = async function(){
  var btn = this;
  var sel = document.getElementById('userSelect');
  var name = sel.options[sel.selectedIndex] ? sel.options[sel.selectedIndex].text : '';
  var empId = document.getElementById('empId').value.trim();
  var pin = document.getElementById('pin').value.trim();
  if(!empId){ U.toast('กรุณาเลือกชื่อหรือกรอกรหัสพนักงาน','error'); return; }
  if(pin.length < 4){ U.toast('กรุณากรอก PIN 4 หลัก','error'); return; }
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> กำลังเข้าสู่ระบบ';
  try {
    await Auth.login({ empId: empId, name: name, pin: pin });
    var next = qp('next') || 'jobs.html';
    location.href = next;
  } catch(e){
    U.toast(e.message, 'error');
    btn.disabled = false; btn.textContent = 'เข้าสู่ระบบ';
  }
};
document.getElementById('pin').addEventListener('keydown', function(e){ if(e.key==='Enter') document.getElementById('loginBtn').click(); });
</script>
</body>
</html>
