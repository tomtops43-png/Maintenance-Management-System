<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Dashboard — Maintenance System ENC H9</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=24">
<link rel="apple-touch-icon" href="apple-touch-icon.png?v=24">
<link rel="icon" type="image/png" href="apple-touch-icon.png?v=24">
<link rel="manifest" href="site.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ENC H9">
<meta name="theme-color" content="#2563eb">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body data-page="dashboard" data-title="Dashboard (Manager)">
<div class="container">
  <div class="filters">
    <select id="period">
      <option value="today">วันนี้</option>
      <option value="7d" selected>7 วัน</option>
      <option value="month">เดือนนี้</option>
      <option value="custom">กำหนดเอง</option>
    </select>
    <input type="date" id="fromDate" style="display:none">
    <input type="date" id="toDate" style="display:none">
    <select id="fLine"><option value="">ทุกไลน์</option></select>
    <button class="btn small secondary" id="applyBtn">แสดงผล</button>
  </div>

  <div class="kpi-grid" id="kpis"></div>

  <div class="chart-card"><h3>Downtime รายวัน (นาที)</h3><div class="chart-wrap"><canvas id="dailyChart"></canvas></div></div>

  <div class="chart-grid">
    <div class="chart-card"><h3>Pareto ตามประเภทปัญหา (Main_Issue)</h3><div class="chart-wrap"><canvas id="paretoChart"></canvas></div></div>
    <div class="chart-card"><h3>Top 5 Station เสียบ่อย</h3><div class="chart-wrap"><canvas id="stationChart"></canvas></div></div>
    <div class="chart-card"><h3>MTTR แยกตามประเภทปัญหา (นาที)</h3><div class="chart-wrap"><canvas id="mttrChart"></canvas></div></div>
    <div class="chart-card"><h3>เปรียบเทียบ Downtime ตามไลน์</h3><div class="chart-wrap"><canvas id="lineChart"></canvas></div></div>
  </div>

  <div class="chart-card">
    <h3>งานล่าสุด</h3>
    <div class="table-wrap">
      <table id="recentTable">
        <thead><tr><th>MT Job</th><th>วันที่</th><th>ไลน์</th><th>Station</th><th>อาการ</th><th>สถานะ</th><th class="right">Downtime</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>
<div class="loading-overlay" id="overlay"><div class="load-card"><div class="spinner"></div><span>กำลังโหลด...</span></div></div>

<script src="js/config.js?v=24"></script>
<script src="js/utils.js?v=24"></script>
<script src="js/api.js?v=24"></script>
<script src="js/auth.js?v=24"></script>
<script src="js/layout.js?v=24"></script>
<script src="js/dashboard.js?v=24"></script>
</body>
</html>
