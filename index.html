<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>แจ้งซ่อม — MMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=5">
<link rel="apple-touch-icon" href="apple-touch-icon.png?v=5">
<link rel="icon" type="image/png" href="apple-touch-icon.png?v=5">
<link rel="manifest" href="site.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MMS">
<meta name="theme-color" content="#2563eb">
</head>
<body data-page="index" data-title="แจ้งซ่อม (BM)">
<div class="container narrow">
  <!-- PENDING (OPEN) JOBS -->
  <div class="card" id="pendingJobsCard" style="display:none; border-color:#fbbf24; background:#fffbeb">
    <div style="font-weight:700; margin-bottom:8px">⚠️ งานซ่อมค้าง (ยังไม่ปิดงาน)</div>
    <div id="pendingJobsList" style="max-height:220px; overflow-y:auto"></div>
  </div>

  <!-- FORM -->
  <div id="formView">
    <div class="card">
      <div class="card-head">
        <span class="ch-icon">🛠️</span>
        <div>
          <div class="ch-title">แจ้งซ่อมเครื่องจักร</div>
          <div class="ch-sub">กรอกข้อมูลให้ครบถ้วน ระบบจะออกเลขงาน (MT Job No.) ให้อัตโนมัติ</div>
        </div>
      </div>
      <div class="field">
        <label>ไลน์ผลิต <span class="req">*</span></label>
        <select id="line"></select>
      </div>
      <div class="row">
        <div class="field">
          <label>M/C No. / Station <span class="req">*</span></label>
          <input id="mc" list="stationList" placeholder="เช่น Station 5">
          <datalist id="stationList"></datalist>
        </div>
      </div>
      <div class="field">
        <label>อาการเสีย (Symptom) <span class="req">*</span></label>
        <textarea id="symptom" placeholder="อธิบายอาการสั้นๆ เช่น เครื่องหยุด ไฟไม่ติด"></textarea>
      </div>
      <div class="field">
        <label>ความเร่งด่วน (Priority) <span class="req">*</span></label>
        <select id="priority"></select>
      </div>
      <div class="field">
        <label>เครื่องหยุดหรือไม่</label>
        <div class="toggle">
          <label class="switch"><input type="checkbox" id="machineStop"><span class="slider"></span></label>
          <span id="machineStopLabel">เครื่องยังเดินได้</span>
        </div>
      </div>
      <div class="field">
        <label>รูปก่อนซ่อม (ถ่าย/เลือกรูป)</label>
        <input type="file" id="photo" accept="image/*" capture="environment">
        <img id="photoPreview" class="photo-preview" alt="preview">
        <div class="hint" id="photoHint"></div>
      </div>
      <div class="field">
        <label>ชื่อผู้แจ้ง <span class="req">*</span></label>
        <input id="reporter" placeholder="ชื่อ-สกุล">
      </div>
      <div class="hint" id="shiftInfo"></div>
      <button class="btn" id="submitBtn" style="margin-top:8px">ส่งแจ้งซ่อม</button>
    </div>
  </div>

  <!-- CONFIRMATION -->
  <div id="confirmView" style="display:none">
    <div class="card confirm-box">
      <div class="check">✅</div>
      <div>แจ้งซ่อมสำเร็จ! หมายเลขงานของคุณคือ</div>
      <div class="job-no" id="confirmJobNo">—</div>
      <div class="hint">โปรดจดหมายเลขนี้ไว้เพื่อติดตามงาน</div>
      <button class="btn" id="newBtn" style="margin-top:18px">แจ้งซ่อมงานใหม่</button>
      <a class="btn secondary" href="jobs.html" style="margin-top:8px">ไปที่บอร์ดงาน</a>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>
<div class="loading-overlay" id="overlay"><div class="load-card"><div class="spinner"></div><span>กำลังโหลด...</span></div></div>

<script src="js/config.js?v=5"></script>
<script src="js/utils.js?v=5"></script>
<script src="js/api.js?v=5"></script>
<script src="js/auth.js?v=5"></script>
<script src="js/layout.js?v=5"></script>
<script src="js/bm.js?v=5"></script>
</body>
</html>
