<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>PM — Maintenance System ENC H9</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=28">
<link rel="apple-touch-icon" href="apple-touch-icon.png?v=28">
<link rel="icon" type="image/png" href="apple-touch-icon.png?v=28">
<link rel="manifest" href="site.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ENC H9">
<meta name="theme-color" content="#2563eb">
</head>
<body data-page="pm" data-title="บำรุงรักษาเชิงป้องกัน (PM)">
<div class="container">
  <div class="tabs">
    <button data-tab="due" class="active">ถึงกำหนด</button>
    <button data-tab="all">แผน PM ทั้งหมด</button>
  </div>
  <div id="dueView"></div>
  <div id="allView" style="display:none"></div>
</div>

<!-- Do PM modal -->
<div class="modal-backdrop" id="pmModal">
  <div class="modal">
    <button type="button" class="modal-close" id="pmModalXBtn" aria-label="ปิด">&times;</button>
    <h2>ทำ PM <span id="pmModalId" class="pill"></span></h2>
    <div id="pmModalItem" class="hint" style="margin-bottom:12px"></div>
    <div class="field">
      <label>ผลการตรวจ <span class="req">*</span></label>
      <div class="tabs">
        <button type="button" id="resOK" class="active">OK ✓</button>
        <button type="button" id="resNG">NG ✗</button>
      </div>
    </div>
    <div class="field" id="ngBox" style="display:none">
      <label>รายละเอียดปัญหา (NG)</label>
      <textarea id="pmNgDetail"></textarea>
    </div>
    <div class="field"><label>การดำเนินการ (Action Taken)</label><textarea id="pmAction"></textarea></div>
    <div class="field">
      <label>รูปประกอบ</label>
      <input type="file" id="pmPhoto" accept="image/*" capture="environment">
      <img id="pmPhotoPreview" class="photo-preview" alt="preview">
    </div>
    <div class="btn-group">
      <button class="btn success" id="pmSubmitBtn">บันทึกผล PM</button>
      <button class="btn secondary" id="pmCancelBtn">ยกเลิก</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>
<div class="loading-overlay" id="overlay"><div class="load-card"><div class="spinner"></div><span>กำลังโหลด...</span></div></div>

<script src="js/config.js?v=28"></script>
<script src="js/utils.js?v=28"></script>
<script src="js/api.js?v=28"></script>
<script src="js/auth.js?v=28"></script>
<script src="js/layout.js?v=28"></script>
<script src="js/pm.js?v=28"></script>
</body>
</html>
